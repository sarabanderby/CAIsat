apiVersion: apps/v1
kind: Deployment
metadata:
  name: caisat-detection-backend
  namespace: caisat
  labels:
    app: caisat-detection-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caisat-detection-backend
  template:
    metadata:
      labels:
        app: caisat-detection-backend
    spec:
      containers:
      - name: backend
        image: quay.io/sara_banderby/caisat-detection-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: MODEL_ENDPOINT
          value: "http://yolov8m-satelite-predictor.caisat.svc.cluster.local:8080/v2/models/yolov8m-satelite/infer"
        - name: CONFIDENCE_THRESHOLD
          value: "0.5"
        - name: IOU_THRESHOLD
          value: "0.45"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: caisat-detection-backend
  namespace: caisat
  labels:
    app: caisat-detection-backend
spec:
  selector:
    app: caisat-detection-backend
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: caisat-detection-backend
  namespace: caisat
  labels:
    app: caisat-detection-backend
spec:
  to:
    kind: Service
    name: caisat-detection-backend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
